name: Auditoría temporal OA MINEDUC

on:
  push:
    branches:
      - audit/mineduc-oa-2026
  pull_request:
    branches:
      - main

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Probar fuentes oficiales
        shell: bash
        run: |
          set +e
          cat > urls.txt <<'EOF'
          https://www.curriculumnacional.cl/614/articles-22394_bases.pdf
          https://bibliotecadigital.mineduc.cl/bitstream/handle/20.500.12365/2342/mono-1003.pdf?isAllowed=y&sequence=1
          https://media.mineduc.cl/wp-content/uploads/sites/28/2017/07/Bases-Curriculares7%C2%BA-b%C3%A1sico-a-2%C2%BA-medio.pdf
          https://parvularia.mineduc.cl/wp-content/uploads/sites/34/2018/03/Bases_Curriculares_Ed_Parvularia_2018.pdf
          https://r.jina.ai/http://www.curriculumnacional.cl/614/articles-22394_bases.pdf
          https://r.jina.ai/http://www.curriculumnacional.cl/614/articles-37136_bases.pdf
          https://r.jina.ai/http://www.curriculumnacional.cl/614/articles-91414_bases.pdf
          https://r.jina.ai/http://www.curriculumnacional.cl/614/articles-69957_bases.pdf
          EOF
          : > url-status.txt
          while IFS= read -r url; do
            echo "URL=$url" >> url-status.txt
            curl -L -I --max-time 25 --connect-timeout 10 -sS -o /tmp/headers -w 'HTTP=%{http_code} SIZE=%{size_download} FINAL=%{url_effective}\n' "$url" >> url-status.txt 2>&1
            sed -n '1,8p' /tmp/headers >> url-status.txt 2>/dev/null
            echo '---' >> url-status.txt
          done < urls.txt
          cat url-status.txt
      - name: Publicar prueba de URLs
        uses: actions/upload-artifact@v4
        with:
          name: mineduc-url-status
          path: url-status.txt
          if-no-files-found: error
