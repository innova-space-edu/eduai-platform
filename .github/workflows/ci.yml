name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Normalize lockfile registry
        run: node scripts/normalize-npm-lockfile.mjs

      - name: Verify public npm registry
        run: node -e "const fs=require('fs'); const lock=fs.readFileSync('package-lock.json','utf8'); if(lock.includes('packages.applied-caas-gateway1.internal.api.openai.org')) throw new Error('El lockfile aún contiene URLs privadas'); console.log('Public npm registry verified')"

      - name: Install dependencies
        run: npm install --registry=https://registry.npmjs.org/

      - name: Apply planner maintenance
        run: npm run planner:maintain

      - name: Verify planner maintenance
        run: node -e "const fs=require('fs'); const route=fs.readFileSync('app/api/agents/educador/route.ts','utf8'); if(route.includes('explicación del problema ambiental')) throw new Error('La rúbrica ambiental fija sigue presente'); for(const file of ['fix-exam-generate.diff','fix-exam-create-page.diff']) if(fs.existsSync(file)) throw new Error('Parche temporal aún presente: '+file); console.log('Planner maintenance verified')"

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Focused lint
        run: npx eslint proxy.ts lib/planning-quality-audit.ts lib/school-planning-profiles.ts lib/planner-oa-bridge.ts scripts/test-planner-integral.ts app/api/agents/educador/route.ts app/api/agents/educador/curriculum/route.ts app/educador/page.tsx

      - name: Planner tests
        run: npm run test:planner

      - name: Build
        run: npm run build
