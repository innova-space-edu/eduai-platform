name: Exportación temporal del repositorio

on:
  push:
    branches:
      - fix/mineduc-curriculum-official-2026

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publicar copia de trabajo
        uses: actions/upload-artifact@v4
        with:
          name: eduai-repo-snapshot
          path: |
            app
            components
            data
            lib
            scripts
            package.json
            tsconfig.json
          if-no-files-found: error
