name: Regenerar índice curricular una vez

on:
  push:
    branches:
      - fix/mineduc-curriculum-official-2026
    paths:
      - .github/workflows/regenerate-index-once.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mineduc-curriculum-official-2026
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Regenerar índice y retirar tarea temporal
        run: |
          node scripts/generate-mineduc-index.mjs
          rm -f .github/workflows/regenerate-index-once.yml
      - name: Publicar cambios
        run: |
          git config user.name "Innova Space"
          git config user.email "contacto@innova-space-edu.cl"
          git add data/mineduc/index.json .github/workflows/regenerate-index-once.yml
          git commit -m "chore(curriculum): actualizar índice de 7° básico completo"
          git push origin HEAD:fix/mineduc-curriculum-official-2026
