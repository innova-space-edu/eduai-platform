name: Normalizar propuestas de Inglés 1° a 4° una vez

on:
  push:
    branches:
      - fix/mineduc-curriculum-official-2026
    paths:
      - .github/workflows/normalize-proposals-1-4-once.yml

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mineduc-curriculum-official-2026
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Normalizar registro de propuestas
        run: |
          node <<'NODE'
          const fs = require('fs')
          const path = 'data/mineduc/sources.json'
          const data = JSON.parse(fs.readFileSync(path, 'utf8'))
          data.propuestas_oficiales_verificadas ||= {}
          for (const n of [1, 2, 3, 4]) {
            const nn = String(n).padStart(2, '0')
            data.propuestas_oficiales_verificadas[`basica/${n}_basico/ingles`] = {
              url: `https://www.curriculumnacional.cl/curriculum/1o-6o-basico/ingles-propuesta/${n}-basico`,
              fecha_consulta: '2026-07-17',
              alcance: [`EN${nn} OA 01`, `EN${nn} OA 14`],
              cantidad_oa_contenido: 14,
              caracter: 'propuesta_curricular_no_obligatoria'
            }
          }
          fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n')
          NODE
          rm -f .github/workflows/normalize-proposals-1-4-once.yml
      - name: Publicar normalización
        run: |
          git config user.name "Innova Space"
          git config user.email "contacto@innova-space-edu.cl"
          git add -A data/mineduc/sources.json .github/workflows/normalize-proposals-1-4-once.yml
          git commit -m "chore(curriculum): normalizar propuestas de Inglés de 1° a 4°"
          git push origin HEAD:fix/mineduc-curriculum-official-2026
