name: Validación curricular MINEDUC

on:
  pull_request:
    paths:
      - "data/mineduc/**"
      - "lib/mineduc-oa.ts"
      - "lib/planificador-curriculum.ts"
      - "app/educador/**"
      - "app/api/agents/educador/curriculum/**"
      - "scripts/generate-mineduc-index.mjs"
      - "scripts/validate-mineduc-curriculum.mjs"
      - "package.json"
      - ".github/workflows/curriculum-validation.yml"
  push:
    branches:
      - main
    paths:
      - "data/mineduc/**"
      - "lib/mineduc-oa.ts"
      - "lib/planificador-curriculum.ts"
      - "app/educador/**"
      - "app/api/agents/educador/curriculum/**"
      - "scripts/generate-mineduc-index.mjs"
      - "scripts/validate-mineduc-curriculum.mjs"
      - "package.json"
      - ".github/workflows/curriculum-validation.yml"

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GROQ_API_KEY: ci-placeholder
      GEMINI_API_KEY: ci-placeholder
      OPENROUTER_API_KEY: ci-placeholder
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-placeholder
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder
      SUPABASE_URL: https://example.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: ci-placeholder
      NEXT_PUBLIC_PANEL_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_PANEL_SUPABASE_ANON_KEY: ci-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Normalizar registro e instalar dependencias
        run: |
          node scripts/normalize-npm-lockfile.mjs
          npm install --registry=https://registry.npmjs.org/ --ignore-scripts
      - name: Verificar índice y OA oficiales
        run: |
          npm run curriculum:index
          git diff --exit-code -- data/mineduc/index.json
          npm run curriculum:validate
      - name: Compilar plataforma
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee curriculum-build.log
      - name: Publicar registro de compilación
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: curriculum-build-log
          path: curriculum-build.log
          if-no-files-found: warn
