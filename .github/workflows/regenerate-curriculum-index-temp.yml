name: Regenerar índice curricular temporal

on:
  push:
    branches:
      - fix/mineduc-curriculum-official-2026
    paths:
      - .github/workflows/regenerate-curriculum-index-temp.yml

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/mineduc-curriculum-official-2026
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Regenerar índice
        run: node scripts/generate-mineduc-index.mjs
      - name: Publicar índice actualizado
        run: |
          git config user.name "Innova Space"
          git config user.email "contacto@innova-space-edu.cl"
          git add data/mineduc/index.json
          if git diff --cached --quiet; then
            echo "El índice ya estaba actualizado"
          else
            git commit -m "chore(curriculum): regenerar índice tras verificar 7° básico"
            git push origin HEAD:fix/mineduc-curriculum-official-2026
          fi
