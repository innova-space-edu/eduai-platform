name: Deploy Audio Parser to Hugging Face

on:
  workflow_dispatch:
  push:
    paths:
      - "services/audio-parser/**"
      - ".github/workflows/deploy-audio-parser-hf.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Hugging Face client
        run: python -m pip install --upgrade huggingface_hub

      - name: Create or update Docker Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: EsthefanoMC23/eduai-audio-parser
        run: |
          python - <<'PY'
          import os
          from huggingface_hub import HfApi

          token = os.environ["HF_TOKEN"]
          repo_id = os.environ["HF_SPACE_REPO"]
          api = HfApi(token=token)
          api.create_repo(
              repo_id=repo_id,
              repo_type="space",
              space_sdk="docker",
              private=False,
              exist_ok=True,
          )
          api.upload_folder(
              repo_id=repo_id,
              repo_type="space",
              folder_path="services/audio-parser",
              commit_message="Deploy EduAI Audio Parser",
          )
          print(f"Deployed https://huggingface.co/spaces/{repo_id}")
          PY
